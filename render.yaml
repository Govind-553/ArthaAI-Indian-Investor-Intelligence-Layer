services:
  - type: web
    name: arthaai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ENABLE_SIGNAL_DETECTION_QUEUE
        value: "false"
      - key: AI_SERVICE_URL
        value: https://arthaai-ai-service.onrender.com/api/v1

  - type: web
    name: arthaai-ai-service
    runtime: python
    rootDir: ai-services
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8001
    envVars:
      - key: AI_SERVICE_NAME
        value: arthaai-ai-service
      - key: AI_SERVICE_VERSION
        value: 1.0.0
